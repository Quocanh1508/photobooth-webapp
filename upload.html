<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuocAnh's Booth – Upload</title>
  <link rel="icon" href="Assets/fish-photobooth/favicon.png" type="image/x-icon" />
  <link rel="stylesheet" href="StyleSheets/camera.css" />
  <style>
    #uploadPhotoInput {
      display: none;
    }

    /* ── Crop overlay ──────────────────────────────────── */
    #cropOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #111;
      z-index: 600;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* The interactive crop canvas */
    #cropCanvas {
      width: 100%;
      max-width: 520px;
      aspect-ratio: 520 / 600;
      height: auto;
      display: block;
      touch-action: none;
      cursor: grab;
    }

    #cropCanvas:active {
      cursor: grabbing;
    }

    /* Bottom controls bar */
    .crop-bar {
      width: 100%;
      max-width: 520px;
      background: #1a1a1a;
      padding: 14px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .crop-zoom-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-family: Castoro, serif;
      font-size: 0.9rem;
    }

    #zoomSlider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: #444;
      outline: none;
      cursor: pointer;
    }

    #zoomSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #4A9FDB;
      cursor: pointer;
    }

    #zoomLabel {
      min-width: 3rem;
      color: #aaa;
      font-size: 0.8rem;
    }

    .crop-actions {
      display: flex;
      gap: 10px;
    }

    .crop-actions button {
      flex: 1;
      padding: 12px;
      font-family: Castoro, serif;
      font-size: 1rem;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
    }

    #cropCancel {
      background: #333;
      color: #ccc;
    }

    #cropConfirm {
      background: #4A9FDB;
      color: #fff;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="logo">
    <img src="Assets/fish-photobooth/logo-new.png" alt="Logo">
  </div>

  <div class="photobooth-container" id="booth">
    <div class="bubble-container"></div>
    <canvas id="finalCanvas" width="1176" height="1470"></canvas>
    <input type="file" id="uploadPhotoInput" accept="image/*" />
    <img class="frame-overlay" src="Assets/fish-photobooth/camerapage/frame.png" alt="frame overlay" />
  </div>

  <div class="controls">
    <button id="uploadPhoto">Upload Photo 1</button>
    <button id="readyButton" disabled style="display:none;">Go Decorate →</button>
  </div>

  <!-- ── Crop overlay ── -->
  <div id="cropOverlay">
    <!-- intrinsic size 520×600; JS will scale to match CROP_ASPECT per slot -->
    <canvas id="cropCanvas" width="520" height="600"></canvas>

    <div class="crop-bar">
      <div class="crop-zoom-row">
        <span>🔍</span>
        <input type="range" id="zoomSlider" min="1" max="5" step="0.05" value="1" />
        <span id="zoomLabel">1.0×</span>
      </div>
      <div class="crop-actions">
        <button id="cropCancel">Cancel</button>
        <button id="cropConfirm">✓ Use This</button>
      </div>
    </div>
  </div>

  <script src="Javascripts/upload.js"></script>
  <script src="Javascripts/bubbles.js"></script>
</body>

</html>
